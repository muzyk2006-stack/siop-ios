name: Build SIoP iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app without signing
        run: |
          xcodebuild \
            -project SIoP.xcodeproj \
            -scheme SIoP \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find built app
        run: |
          find build -name "*.app" -print

      - name: Package app as IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "SIoP.app" | head -n 1)
          cp -R "$APP_PATH" Payload/
          zip -r SIoP.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIoP-ipa
          path: SIoP.ipa
